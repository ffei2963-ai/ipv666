version: "3.9"

services:
  ipv666:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipv666
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2:0.5b}
      - PROXY_BASE_PORT=${PROXY_BASE_PORT:-10000}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      - TLS_ENABLED=${TLS_ENABLED:-false}
      - TLS_DOMAIN=${TLS_DOMAIN:-}
      - TLS_EMAIL=${TLS_EMAIL:-admin@example.com}
      - VPS_IPV6_INTERFACE=${VPS_IPV6_INTERFACE:-eth0}
      - OLLAMA_HOST=127.0.0.1:11434
    volumes:
      - ./data:/app/data
      - ./ollama_data:/root/.ollama
      - ./xray_configs:/usr/local/etc/xray
      - ./certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
